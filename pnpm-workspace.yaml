# Single-package repo. pnpm 10.x requires a non-empty `packages:` field whenever
# this file exists, so declare just the root ('.'), which matches the lockfile's
# single importer. The rest are dependency build-script approvals + skipping the
# pre-run deps check (which otherwise hard-fails on core-js's funding-message
# build script).
packages:
  - '.'
onlyBuiltDependencies:
  - '@tailwindcss/oxide'
  - core-js
  - esbuild
verifyDepsBeforeRun: false
