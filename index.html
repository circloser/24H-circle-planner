    <!-- Google tag (gtag.js) — loaded only on the deployed http(s) site, so
         local dev and the offline single-file build (file://) don't pollute
         Analytics. On production this behaves like the standard GA snippet. -->

      (function () {
        var host = location.hostname;
        if (location.protocol.indexOf('http') !== 0) return; // skip file://
        if (host === 'localhost' || host === '127.0.0.1' || host === '') return; // skip local dev
        window.dataLayer = window.dataLayer || [];
        window.gtag = function () { dataLayer.push(arguments); };
        gtag('js', new Date());
        gtag('config', 'G-2YQFP0PTLZ');
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=G-2YQFP0PTLZ';
        document.head.appendChild(s);
      })();
    </script>
